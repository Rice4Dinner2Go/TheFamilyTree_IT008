<!DOCTYPE html>
<html>
  <head>
    <title>Family Tree</title>
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/canvas.css" />
    <link rel="stylesheet" href="style/HamburgerMenu.css" />
    <link rel="stylesheet" href="style/PageTransition.css" />
    <link rel="stylesheet" href="style/InformationPanel.css" />
  </head>
  <body>
    <div class="canvas-container">
      <div class="draggable-canvas">
        <!-- Những gì viết trong đây khi kéo thả nền thì sẽ đi theo -->
        <h1 style="position: absolute; left: 1500px; top: 600px">
          Try dragging the background
        </h1>

        <p style="position: absolute; left: 1500px; top: 700px">Also test</p>

        <!-- Hết -->
      </div>
    </div>

    <!-- Những gì viết ngoài đây thì sẽ không đi theo khi kéo thả nền -->

    <div>
      <!-- Hamburger menu-->
      <nav class="sidebar">
        <div class="hamburger">
          <div></div>
          <div></div>
          <div></div>
        </div>
        <a href="#">Do smt 1</a>
        <a href="#">Do smt 2</a>
        <a href="#">Go smw</a>
        <a href="#" onclick="goToPage('main')">Quit</a>
      </nav>
    </div>
    <!-- End_ Hamburger menu-->

    <h1 style="position: fixed; left: 700px; top: 100px">
      Test Family Tree title
    </h1>
    <!--Search box -->
    <div class="Searchbox_container">
      <input type="text" placeholder="Vui lòng nhập tên..." />
      <div class="search"></div>
    </div>
    <!--Panel bên phải-->
    <div class="information-panel">
      <div class="info-panel">
        <img src="img/avatar.jpg" alt="avatar_image1" />
        <h2>PERSONAL INFORMATION</h2>
        <div class="info-item">
          <strong>Full name:</strong> <span id="info-name"></span>
        </div>
        <div class="info-item">
          <strong>Age:</strong> <span id="info-age"></span>
        </div>
        <div class="info-item">
          <strong>Date of Birth:</strong> <span id="info-birthday"></span>
        </div>
        <div class="info-item">
          <strong>Gender:</strong> <span id="info-gender"></span>
        </div>
      </div>
      <!-- Hết -->
      <div class="Toolbar_container">
        <button id="addButton" class="toolbarButton">➕</button>
        <button id="editButton" class="toolbarButton">✏️</button>
        <button id="deleteButton" class="toolbarButton">❌</button>
      </div>
      <!-- Hộp thoại thêm thành viên -->
      <div id="dialog" class="dialog hidden">
        <div class="dialog-content">
          <h2>Add Member</h2>
          <form id="addMemberForm">
            <div class="section">
              <h3>Add</h3>
              <label>
                <input
                  type="radio"
                  name="relationship"
                  value="parent"
                  checked
                />
                Parent
              </label>
              <label>
                <input type="radio" name="relationship" value="relation" />
                Relation
              </label>
              <label>
                <input type="radio" name="relationship" value="sibling" />
                Sibling (Add a Parent first)
              </label>
              <label>
                <input type="radio" name="relationship" value="child" />
                Child
              </label>
            </div>

            <div class="section">
              <h3>How</h3>
              <label>
                <input type="radio" name="action" value="create" checked />
                Create new person
              </label>
            </div>

            <div class="section">
              <h3>New Person</h3>
              <label>
                Given Name:
                <input
                  type="text"
                  name="givenName"
                  placeholder="Enter given name"
                  required
                />
              </label>
              <label>
                Surname:
                <input type="text" name="surname" placeholder="Enter surname" />
              </label>
              <label>
                Sex:
                <select name="sex">
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                </select>
              </label>
            </div>
            <div class="dialog-actions">
              <button type="button" id="cancelButton" class="cancel-btn">
                Cancel
              </button>
              <button type="submit" class="create-btn">Create</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <!--Hộp thoại sửa thành viên-->
    <div id="editDialog" class="dialog hidden">
      <div class="dialog-content">
        <h2>Edit Member</h2>
        <form id="editForm">
          <label for="editName">Full name:</label>
          <input
            type="text"
            id="editName"
            placeholder="Enter full name"
            required
          />
          <label for="editBirthday">Date of Birth:</label>
          <input type="date" id="editBirthday" required />
          <label for="editGender">Gender:</label>
          <select id="editGender">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <div class="dialog-actions">
            <button type="button" id="cancelEditButton" class="cancel-btn">
              Cancel
            </button>
            <button type="submit" class="create-btn">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Hộp thoại xác nhận xóa thành viên-->
    <div id="deleteDialog" class="dialog hidden">
      <div class="dialog-content">
        <h2>Are you sure you want to delete this member?</h2>
        <div class="dialog-actions">
          <button type="button" id="cancelDeleteButton" class="cancel-btn">
            Cancel
          </button>
          <button type="button" id="confirmDeleteButton" class="create-btn">
            Delete
          </button>
        </div>
      </div>
    </div>
    <!-- Hết -->
    <script src="script/canvas.js"></script>
    <script src="script/HamburgerMenu.js"></script>
    <script src="script/PageTransition.js"></script>
    <script src="script/information_panel.js"></script>
  </body>
</html>
